# Render 部署配置文件
# 文档: https://render.com/docs/blueprint-spec

databases:
  - name: taohuawu-db
    databaseName: water_town
    user: water_town
    plan: free  # PostgreSQL 免费版

services:
  # 后端服务
  - type: web
    name: taohuawu-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: taohuawu-db
          property: connectionString
      - key: GLM_API_KEY
        sync: false  # 需要在 Render 控制台手动设置
      - key: MIMO_API_KEY
        sync: false
      - key: BAILIAN_API_KEY
        sync: false
      - key: GIN_MODE
        value: release

  # 前端服务（静态站点）
  - type: web
    name: taohuawu-frontend
    env: static
    buildCommand: cd frontend && echo "Static files ready"
    staticPublishPath: frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://taohuawu-backend.onrender.com
